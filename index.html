<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorador de Matriz Normativa — Prototipo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3347;
    --text: #e2e4ed;
    --text-dim: #8b8fa7;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --accent-glow: rgba(108, 92, 231, 0.15);
    --green: #00cec9;
    --orange: #fdcb6e;
    --red: #e17055;
    --pink: #fd79a8;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(108,92,231,0.06) 0%, transparent 100%);
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .header h1 span { color: var(--accent-light); }
  .header .badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* ── Nav Tabs ── */
  .nav {
    display: flex;
    gap: 4px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .nav button {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border: 1px solid transparent;
    border-radius: 8px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav button:hover { color: var(--text); background: var(--surface2); }
  .nav button.active {
    color: var(--accent-light);
    background: var(--accent-glow);
    border-color: rgba(108,92,231,0.3);
  }

  /* ── Main Layout ── */
  .main { display: flex; height: calc(100vh - 110px); }

  /* ── Sidebar ── */
  .sidebar {
    width: 340px;
    min-width: 340px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
  }
  .search-box {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .search-box input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-box input:focus { border-color: var(--accent); }

  .list-container {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .list-container::-webkit-scrollbar { width: 6px; }
  .list-container::-webkit-scrollbar-track { background: transparent; }
  .list-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .cat-group { margin-bottom: 4px; }
  .cat-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--green);
    padding: 14px 12px 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .list-item {
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    line-height: 1.4;
  }
  .list-item:hover { background: var(--surface2); }
  .list-item.active {
    background: var(--accent-glow);
    border: 1px solid rgba(108,92,231,0.25);
  }
  .list-item .count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent-light);
    background: rgba(108,92,231,0.12);
    padding: 2px 8px;
    border-radius: 12px;
    flex-shrink: 0;
    margin-left: 8px;
  }

  /* ── Detail Panel ── */
  .detail {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
  }
  .detail::-webkit-scrollbar { width: 6px; }
  .detail::-webkit-scrollbar-track { background: transparent; }
  .detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .detail-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 14px;
    text-align: center;
  }
  .detail-empty .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }

  .detail-header {
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .detail-header .cat-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--green);
    margin-bottom: 6px;
  }
  .detail-header h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.3;
  }
  .detail-header .stats {
    margin-top: 12px;
    display: flex;
    gap: 20px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .detail-header .stats strong {
    color: var(--accent-light);
    font-weight: 600;
  }

  .relation-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 1100px) {
    .relation-grid { grid-template-columns: 1fr; }
  }

  .relation-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: all 0.2s;
    cursor: pointer;
  }
  .relation-card:hover {
    border-color: var(--accent);
    background: var(--accent-glow);
    transform: translateY(-1px);
  }
  .relation-card .r-name {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .relation-card .r-cat {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .relation-card .r-article {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--orange);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  /* ── Chord View ── */
  .chord-container {
    height: calc(100vh - 110px);
    display: none;
    overflow: hidden;
  }
  .chord-layout {
    display: flex;
    height: 100%;
  }
  .chord-svg-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    min-width: 0;
  }
  .chord-svg-wrap svg {
    width: 100%;
    height: 100%;
    max-width: 700px;
    max-height: 700px;
  }
  .chord-info {
    width: 320px;
    min-width: 320px;
    border-left: 1px solid var(--border);
    background: var(--surface);
    padding: 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .chord-info-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
  }
  .chord-info h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .chord-info .ci-type {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .chord-info .ci-stat {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .chord-info .ci-stat .ci-val {
    font-family: 'DM Mono', monospace;
    font-weight: 600;
    color: var(--accent-light);
  }
  .chord-info .ci-connections {
    margin-top: 16px;
  }
  .chord-info .ci-connections h4 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .chord-info .ci-conn-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 4px;
    transition: background 0.15s;
  }
  .chord-info .ci-conn-item:hover { background: var(--surface2); }
  .chord-info .ci-conn-bar {
    height: 4px;
    border-radius: 2px;
    margin-top: 4px;
  }

  .tooltip {
    position: fixed;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    z-index: 1000;
    max-width: 300px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    display: none;
  }
  .tooltip .t-reg { font-weight: 600; color: var(--accent-light); }
  .tooltip .t-tema { color: var(--green); margin-top: 2px; }
  .tooltip .t-art { font-family: 'DM Mono', monospace; color: var(--orange); margin-top: 6px; }

  /* ── Stats View ── */
  .stats-container {
    padding: 32px;
    height: calc(100vh - 110px);
    overflow-y: auto;
    display: none;
  }
  .stats-container h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  .stat-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
  }
  .stat-card .num {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent-light);
    font-family: 'DM Mono', monospace;
  }
  .stat-card .label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .bar-chart { margin-bottom: 32px; }
  .bar-chart h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 14px;
    color: var(--text-dim);
  }
  .bar-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
  }
  .bar-label {
    width: 220px;
    min-width: 220px;
    font-size: 12px;
    text-align: right;
    padding-right: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .bar-track {
    flex: 1;
    height: 24px;
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
    display: flex;
    align-items: center;
    padding-left: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: white;
  }

  /* ── Breadcrumb ── */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    flex-wrap: wrap;
  }
  .breadcrumb .bc-step {
    color: var(--accent-light);
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 4px;
    transition: all 0.15s;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .breadcrumb .bc-step:hover {
    background: var(--accent-glow);
    color: var(--text);
  }
  .breadcrumb .bc-sep { color: var(--text-dim); font-size: 10px; }
  .breadcrumb .bc-current {
    color: var(--text);
    font-weight: 600;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .breadcrumb .bc-clear {
    margin-left: auto;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .breadcrumb .bc-clear:hover { color: var(--red); background: rgba(225,112,85,0.1); }
  .breadcrumb .bc-tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: -4px;
    margin-right: 2px;
  }

  /* ── Animations ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: fadeIn 0.25s ease forwards; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
</head>
<body>

<div class="header">
  <h1>Explorador de <span>Matriz Normativa</span></h1>
  <span class="badge">PROTOTIPO v0.1</span>
</div>

<div class="nav">
  <button class="active" onclick="switchView('explore')">Explorar Relaciones</button>
  <button onclick="switchView('chord')">Diagrama de Acordes</button>
  <button onclick="switchView('stats')">Estadísticas</button>
</div>

<!-- ═══ EXPLORE VIEW ═══ -->
<div class="main" id="view-explore">
  <div class="sidebar">
    <div class="nav" style="padding: 12px 8px; border-bottom: 1px solid var(--border); background: transparent;">
      <button class="active" id="btn-regs" onclick="switchMode('regs')">Reglamentos</button>
      <button id="btn-temas" onclick="switchMode('temas')">Temas</button>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar..." oninput="filterList()">
    </div>
    <div class="list-container" id="listContainer"></div>
  </div>
  <div class="detail" id="detailPanel">
    <div class="detail-empty">
      <div>
        <div class="icon">⟵</div>
        <div>Seleccioná un reglamento o tema<br>para ver sus relaciones</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ CHORD VIEW ═══ -->
<div class="chord-container" id="view-chord">
  <div class="chord-layout">
    <div class="chord-svg-wrap">
      <svg id="chordSvg"></svg>
    </div>
    <div class="chord-info" id="chordInfo">
      <div class="chord-info-empty">
        <div class="icon" style="font-size:36px; opacity:0.3; margin-bottom:12px;">◎</div>
        <div>Pasá el cursor sobre un segmento<br>o cuerda para ver el detalle</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ STATS VIEW ═══ -->
<div class="stats-container" id="view-stats">
  <h2>Estadísticas de la Matriz</h2>
  <div class="stat-cards" id="statCards"></div>
  <div class="bar-chart" id="topRegs"></div>
  <div class="bar-chart" id="topTemas"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ═══════════════════════════════════════════════
//  SAMPLE DATA (Generic / Demo)
// ═══════════════════════════════════════════════

const regCategories = [
  "Normativa Constitucional",
  "Leyes Nacionales",
  "Órganos Superiores",
  "Reglamentos Administrativos",
  "Investigación y Extensión",
  "Docencia",
  "Recursos Humanos",
  "Vida Estudiantil"
];

const temaCategories = [
  "Órganos Institucionales",
  "Financieras",
  "Funcionarios",
  "Estudiantes",
  "Planificación",
  "Activos y Recursos",
  "Seguridad y Salud"
];

const reglamentos = [];
const temas = [];
const cruces = [];

// Generate sample regulations
const regNames = {
  "Normativa Constitucional": ["Constitución Política"],
  "Leyes Nacionales": ["Ley Orgánica de la Institución", "Ley de Control Interno", "Ley de Administración Pública", "Ley de Presupuestos Públicos"],
  "Órganos Superiores": ["Estatuto Orgánico", "Reglamento del Consejo Institucional", "Reglamento de Asamblea Representativa", "Normas de Secretaría del Consejo"],
  "Reglamentos Administrativos": ["Reglamento de Contratación Administrativa", "Reglamento de Gestión de Activos", "Reglamento de Transportes", "Reglamento de Tecnologías de Información", "Reglamento de Convenios", "Reglamento de Servicios Bibliotecarios"],
  "Investigación y Extensión": ["Reglamento de Investigación", "Reglamento de Extensión", "Reglamento de Propiedad Intelectual", "Reglamento de Centros de Investigación"],
  "Docencia": ["Reglamento de Enseñanza-Aprendizaje", "Reglamento de Planes de Estudio", "Reglamento de Acreditación", "Reglamento de Programas de Posgrado", "Reglamento de Educación Continua"],
  "Recursos Humanos": ["Convención Colectiva", "Reglamento de Carrera Profesional", "Reglamento de Becas para Funcionarios", "Reglamento de Evaluación del Desempeño", "Reglamento de Reclutamiento y Selección"],
  "Vida Estudiantil": ["Reglamento de Becas Estudiantiles", "Reglamento Disciplinario", "Reglamento de Admisión y Matrícula", "Reglamento de Graduación"]
};

const temaNames = {
  "Órganos Institucionales": ["Composición del Consejo Directivo", "Funciones de Asambleas", "Nombramiento de Coordinadores", "Funcionamiento de Comisiones", "Sedes Regionales"],
  "Financieras": ["Presupuesto Institucional", "Procedimientos de Contratación", "Gastos de Representación", "Fondos Especiales", "Ingresos Propios", "Auditoría Financiera"],
  "Funcionarios": ["Derechos Laborales", "Deberes del Personal", "Evaluación del Desempeño", "Régimen Disciplinario", "Capacitación y Formación", "Carrera Profesional", "Jornada Laboral"],
  "Estudiantes": ["Admisión y Matrícula", "Régimen Disciplinario Estudiantil", "Becas y Asistencia", "Graduación", "Derechos Estudiantiles"],
  "Planificación": ["Planificación Estratégica", "Planes Operativos", "Indicadores de Gestión", "Acreditación Institucional"],
  "Activos y Recursos": ["Gestión de Activos Muebles", "Infraestructura", "Tecnologías de Información", "Transportes Institucionales"],
  "Seguridad y Salud": ["Seguridad Ocupacional", "Salud en el Trabajo", "Protocolo de Emergencias"]
};

// Build arrays
let regId = 0;
for (const [cat, names] of Object.entries(regNames)) {
  for (const name of names) {
    reglamentos.push({ id: regId++, name, category: cat });
  }
}

let temaId = 0;
for (const [cat, names] of Object.entries(temaNames)) {
  for (const name of names) {
    temas.push({ id: temaId++, name, category: cat });
  }
}

// Generate random cruces
const artPrefixes = ["Art", "Arts", "Capítulo", "Sección"];
function randomArticle() {
  const p = artPrefixes[Math.floor(Math.random() * 2)];
  const n = Math.floor(Math.random() * 80) + 1;
  if (Math.random() > 0.6) {
    const n2 = n + Math.floor(Math.random() * 5) + 1;
    return `${p} ${n}-${n2}`;
  }
  return `${p} ${n}`;
}

for (const reg of reglamentos) {
  const numRelations = Math.floor(Math.random() * 12) + 2;
  const usedTemas = new Set();
  for (let i = 0; i < numRelations; i++) {
    let t;
    do { t = Math.floor(Math.random() * temas.length); } while (usedTemas.has(t));
    usedTemas.add(t);
    cruces.push({ regId: reg.id, temaId: t, article: randomArticle() });
  }
}

// ═══════════════════════════════════════════════
//  APP STATE & LOGIC
// ═══════════════════════════════════════════════

let currentView = 'explore';
let currentMode = 'regs'; // 'regs' or 'temas'
let selectedId = null;
let navHistory = []; // { id, mode, name }

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav')[0].querySelectorAll('button').forEach((b, i) => {
    b.classList.toggle('active', ['explore','chord','stats'][i] === view);
  });
  document.getElementById('view-explore').style.display = view === 'explore' ? 'flex' : 'none';
  document.getElementById('view-chord').style.display = view === 'chord' ? 'block' : 'none';
  document.getElementById('view-stats').style.display = view === 'stats' ? 'block' : 'none';

  if (view === 'chord') renderChord();
  if (view === 'stats') renderStats();
}

function switchMode(mode, keepHistory) {
  currentMode = mode;
  selectedId = null;
  if (!keepHistory) navHistory = [];
  document.getElementById('btn-regs').classList.toggle('active', mode === 'regs');
  document.getElementById('btn-temas').classList.toggle('active', mode === 'temas');
  document.getElementById('searchInput').placeholder = mode === 'regs' ? 'Buscar reglamento...' : 'Buscar tema...';
  document.getElementById('searchInput').value = '';
  renderList();
  renderDetail();
}

function filterList() {
  renderList();
}

function renderList() {
  const container = document.getElementById('listContainer');
  const query = document.getElementById('searchInput').value.toLowerCase();
  const items = currentMode === 'regs' ? reglamentos : temas;

  const grouped = {};
  items.forEach(item => {
    if (query && !item.name.toLowerCase().includes(query)) return;
    if (!grouped[item.category]) grouped[item.category] = [];

    const relCount = currentMode === 'regs'
      ? cruces.filter(c => c.regId === item.id).length
      : cruces.filter(c => c.temaId === item.id).length;

    grouped[item.category].push({ ...item, relCount });
  });

  let html = '';
  for (const [cat, items] of Object.entries(grouped)) {
    html += `<div class="cat-group">
      <div class="cat-label">${cat}</div>`;
    items.forEach(item => {
      html += `<div class="list-item ${selectedId === item.id ? 'active' : ''}" 
                    onclick="selectItem(${item.id})">
        <span>${item.name}</span>
        <span class="count">${item.relCount}</span>
      </div>`;
    });
    html += `</div>`;
  }
  container.innerHTML = html;
}

function selectItem(id, fromJump) {
  if (!fromJump) navHistory = [];
  selectedId = id;
  renderList();
  renderDetail();
}

function renderDetail() {
  const panel = document.getElementById('detailPanel');

  if (selectedId === null) {
    panel.innerHTML = `<div class="detail-empty"><div>
      <div class="icon">⟵</div>
      <div>Seleccioná un ${currentMode === 'regs' ? 'reglamento' : 'tema'}<br>para ver sus relaciones</div>
    </div></div>`;
    return;
  }

  const item = currentMode === 'regs'
    ? reglamentos.find(r => r.id === selectedId)
    : temas.find(t => t.id === selectedId);

  const relations = currentMode === 'regs'
    ? cruces.filter(c => c.regId === selectedId).map(c => ({
        ...temas[c.temaId], article: c.article
      }))
    : cruces.filter(c => c.temaId === selectedId).map(c => ({
        ...reglamentos.find(r => r.id === c.regId), article: c.article
      }));

  const catCounts = {};
  relations.forEach(r => { catCounts[r.category] = (catCounts[r.category] || 0) + 1; });
  const topCat = Object.entries(catCounts).sort((a,b) => b[1] - a[1])[0];

  let html = '';

  // Breadcrumb
  if (navHistory.length > 0) {
    html += `<div class="breadcrumb animate-in">`;
    navHistory.forEach((step, i) => {
      const tag = step.mode === 'regs' ? 'REG' : 'TEMA';
      html += `<span class="bc-tag">${tag}</span>`;
      html += `<span class="bc-step" title="${step.name}" onclick="navigateTo(${i})">${step.name}</span>`;
      html += `<span class="bc-sep">→</span>`;
    });
    const currentTag = currentMode === 'regs' ? 'REG' : 'TEMA';
    html += `<span class="bc-tag">${currentTag}</span>`;
    html += `<span class="bc-current" title="${item.name}">${item.name}</span>`;
    html += `<span class="bc-clear" onclick="clearNav()">✕ Limpiar</span>`;
    html += `</div>`;
  }

  html += `<div class="detail-header animate-in">
    <div class="cat-tag">${item.category}</div>
    <h2>${item.name}</h2>
    <div class="stats">
      <span><strong>${relations.length}</strong> ${currentMode === 'regs' ? 'temas relacionados' : 'reglamentos relacionados'}</span>
      <span><strong>${Object.keys(catCounts).length}</strong> categorías</span>
      ${topCat ? `<span>Mayor concentración: <strong>${topCat[0]}</strong></span>` : ''}
    </div>
  </div>`;

  // Group relations by category
  const grouped = {};
  relations.forEach(r => {
    if (!grouped[r.category]) grouped[r.category] = [];
    grouped[r.category].push(r);
  });

  for (const [cat, rels] of Object.entries(grouped)) {
    html += `<div style="margin-bottom: 20px;" class="animate-in">
      <div class="cat-label" style="margin-bottom: 10px; font-size: 13px; letter-spacing: 1.5px; color: var(--green);">${cat} (${rels.length})</div>
      <div class="relation-grid">`;
    rels.forEach(r => {
      const targetMode = currentMode === 'regs' ? 'temas' : 'regs';
      html += `<div class="relation-card" onclick="jumpTo(${r.id}, '${targetMode}')">
        <div class="r-name">${r.name}</div>
        <div class="r-article">📎 ${r.article}</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  panel.innerHTML = html;
}

function jumpTo(id, targetMode) {
  // Save current item to history before jumping
  if (selectedId !== null) {
    const currentItem = currentMode === 'regs'
      ? reglamentos.find(r => r.id === selectedId)
      : temas.find(t => t.id === selectedId);
    if (currentItem) {
      const last = navHistory[navHistory.length - 1];
      if (!last || last.id !== selectedId || last.mode !== currentMode) {
        navHistory.push({ id: selectedId, mode: currentMode, name: currentItem.name });
        if (navHistory.length > 4) navHistory = navHistory.slice(-4);
      }
    }
  }
  if (currentMode !== targetMode) switchMode(targetMode, true);
  selectItem(id, true);
}

function navigateTo(index) {
  const target = navHistory[index];
  // Trim history to that point
  navHistory = navHistory.slice(0, index);
  if (currentMode !== target.mode) switchMode(target.mode, true);
  selectItem(target.id, true);
}

function clearNav() {
  navHistory = [];
  renderDetail();
}
// ═══════════════════════════════════════════════
//  CHORD DIAGRAM
// ═══════════════════════════════════════════════

function renderChord() {
  const svg = d3.select('#chordSvg');
  svg.selectAll('*').remove();

  const container = document.querySelector('.chord-svg-wrap');
  const size = Math.min(container.clientWidth, container.clientHeight, 700);
  const outerRadius = size / 2 - 40;
  const innerRadius = outerRadius - 24;

  svg.attr('viewBox', `${-size/2} ${-size/2} ${size} ${size}`);

  // All categories: regs first, then temas
  const allCats = [...regCategories, ...temaCategories];
  const n = allCats.length;

  // Color palette
  const regColors = ['#6c5ce7','#a29bfe','#7c6ef0','#5a4bd1','#8b7cf6','#4834d4','#6e5ff0','#9b8ffa'];
  const temaColors = ['#00cec9','#55efc4','#81ecec','#00b894','#2ed8d3','#00d2d3','#38d9a9'];
  const colors = [...regColors.slice(0, regCategories.length), ...temaColors.slice(0, temaCategories.length)];

  // Build NxN matrix
  const matrix = Array.from({length: n}, () => Array(n).fill(0));

  cruces.forEach(c => {
    const reg = reglamentos.find(r => r.id === c.regId);
    const tema = temas.find(t => t.id === c.temaId);
    if (!reg || !tema) return;
    const ri = regCategories.indexOf(reg.category);
    const ti = temaCategories.indexOf(tema.category);
    if (ri === -1 || ti === -1) return;
    const row = ri;
    const col = regCategories.length + ti;
    matrix[row][col] += 1;
    matrix[col][row] += 1;
  });

  // D3 chord layout
  const chord = d3.chord()
    .padAngle(0.04)
    .sortSubgroups(d3.descending)(matrix);

  const arc = d3.arc().innerRadius(innerRadius).outerRadius(outerRadius);
  const ribbon = d3.ribbon().radius(innerRadius - 2);

  // Draw arcs (outer segments)
  const arcs = svg.append('g')
    .selectAll('g')
    .data(chord.groups)
    .join('g');

  arcs.append('path')
    .attr('d', arc)
    .attr('fill', d => colors[d.index])
    .attr('stroke', 'rgba(0,0,0,0.3)')
    .attr('stroke-width', 1)
    .style('cursor', 'pointer')
    .on('mouseenter', function(event, d) {
      highlightGroup(d.index, chord);
      showChordInfo('group', d.index, chord);
    })
    .on('mouseleave', function() {
      resetHighlight();
      resetChordInfo();
    });

  // Arc labels
  arcs.append('text')
    .each(d => { d.angle = (d.startAngle + d.endAngle) / 2; })
    .attr('dy', '0.35em')
    .attr('transform', d => `
      rotate(${(d.angle * 180 / Math.PI - 90)})
      translate(${outerRadius + 10})
      ${d.angle > Math.PI ? 'rotate(180)' : ''}
    `)
    .attr('text-anchor', d => d.angle > Math.PI ? 'end' : 'start')
    .attr('fill', d => colors[d.index])
    .attr('font-size', '11px')
    .attr('font-family', 'DM Sans, sans-serif')
    .attr('font-weight', '600')
    .text(d => {
      const name = allCats[d.index];
      return name.length > 20 ? name.slice(0, 18) + '…' : name;
    });

  // Draw ribbons (chords)
  svg.append('g')
    .attr('class', 'ribbons')
    .selectAll('path')
    .data(chord)
    .join('path')
    .attr('d', ribbon)
    .attr('fill', d => colors[d.source.index])
    .attr('fill-opacity', 0.45)
    .attr('stroke', 'rgba(255,255,255,0.05)')
    .attr('stroke-width', 0.5)
    .style('cursor', 'pointer')
    .on('mouseenter', function(event, d) {
      highlightRibbon(d, chord);
      showChordInfo('ribbon', d);
    })
    .on('mouseleave', function() {
      resetHighlight();
      resetChordInfo();
    });

  // Highlight helpers
  function highlightGroup(index, chord) {
    svg.selectAll('.ribbons path')
      .attr('fill-opacity', d =>
        (d.source.index === index || d.target.index === index) ? 0.7 : 0.06
      );
    arcs.selectAll('path')
      .attr('opacity', d => {
        if (d.index === index) return 1;
        const connected = chord.some(c =>
          (c.source.index === index && c.target.index === d.index) ||
          (c.target.index === index && c.source.index === d.index)
        );
        return connected ? 0.8 : 0.2;
      });
  }

  function highlightRibbon(active) {
    svg.selectAll('.ribbons path')
      .attr('fill-opacity', d =>
        (d.source.index === active.source.index && d.target.index === active.target.index) ? 0.85 : 0.06
      );
    arcs.selectAll('path')
      .attr('opacity', d =>
        (d.index === active.source.index || d.index === active.target.index) ? 1 : 0.2
      );
  }

  function resetHighlight() {
    svg.selectAll('.ribbons path').attr('fill-opacity', 0.45);
    arcs.selectAll('path').attr('opacity', 1);
  }

  // Info panel helpers
  function showChordInfo(type, data, chordData) {
    const panel = document.getElementById('chordInfo');
    if (type === 'group') {
      const index = data;
      const catName = allCats[index];
      const isReg = index < regCategories.length;
      const typeLabel = isReg ? 'Categoría de Reglamento' : 'Categoría de Tema';

      // Find all connections
      const connections = [];
      chordData.forEach(c => {
        if (c.source.index === index && c.source.value > 0) {
          connections.push({ name: allCats[c.target.index], value: c.source.value, color: colors[c.target.index] });
        } else if (c.target.index === index && c.target.value > 0) {
          connections.push({ name: allCats[c.source.index], value: c.target.value, color: colors[c.source.index] });
        }
      });
      connections.sort((a, b) => b.value - a.value);
      const totalRels = connections.reduce((s, c) => s + c.value, 0);
      const maxConn = connections[0]?.value || 1;

      let html = `
        <div style="color:${colors[index]};" class="ci-type">${typeLabel}</div>
        <h3>${catName}</h3>
        <div class="ci-stat"><span>Relaciones totales</span><span class="ci-val">${totalRels}</span></div>
        <div class="ci-stat"><span>Conexiones</span><span class="ci-val">${connections.length} categorías</span></div>
        <div class="ci-connections">
          <h4>Conectada con</h4>
          ${connections.map(c => `
            <div class="ci-conn-item">
              <div>
                <div>${c.name}</div>
                <div class="ci-conn-bar" style="width:${(c.value/maxConn)*120}px; background:${c.color};"></div>
              </div>
              <span style="font-family:'DM Mono',monospace; font-size:12px; color:var(--accent-light);">${c.value}</span>
            </div>
          `).join('')}
        </div>`;
      panel.innerHTML = html;

    } else if (type === 'ribbon') {
      const srcName = allCats[data.source.index];
      const tgtName = allCats[data.target.index];
      const val = data.source.value;

      let html = `
        <div class="ci-type" style="color:${colors[data.source.index]};">Conexión</div>
        <h3 style="font-size:14px; line-height:1.4;">${srcName} <span style="color:var(--text-dim); font-weight:400;">↔</span> ${tgtName}</h3>
        <div class="ci-stat" style="margin-top:16px;"><span>Relaciones</span><span class="ci-val">${val}</span></div>
        <div style="margin-top:20px; padding:16px; background:var(--surface2); border-radius:8px; font-size:12px; color:var(--text-dim); line-height:1.5;">
          Esta conexión representa ${val} artículos donde reglamentos de <strong style="color:${colors[data.source.index]};">${srcName}</strong> mencionan temas de <strong style="color:${colors[data.target.index]};">${tgtName}</strong>.
        </div>`;
      panel.innerHTML = html;
    }
  }

  function resetChordInfo() {
    document.getElementById('chordInfo').innerHTML = `
      <div class="chord-info-empty">
        <div class="icon" style="font-size:36px; opacity:0.3; margin-bottom:12px;">◎</div>
        <div>Pasá el cursor sobre un segmento<br>o cuerda para ver el detalle</div>
      </div>`;
  }
}

// ═══════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════

function renderStats() {
  // Stat cards
  const totalCruces = cruces.length;
  const avgPerReg = (totalCruces / reglamentos.length).toFixed(1);
  const avgPerTema = (totalCruces / temas.length).toFixed(1);
  const coverage = ((cruces.length / (reglamentos.length * temas.length)) * 100).toFixed(1);

  document.getElementById('statCards').innerHTML = `
    <div class="stat-card"><div class="num">${reglamentos.length}</div><div class="label">Reglamentos</div></div>
    <div class="stat-card"><div class="num">${temas.length}</div><div class="label">Temas</div></div>
    <div class="stat-card"><div class="num">${totalCruces}</div><div class="label">Relaciones</div></div>
    <div class="stat-card"><div class="num">${avgPerReg}</div><div class="label">Temas por Reglamento (promedio)</div></div>
    <div class="stat-card"><div class="num">${avgPerTema}</div><div class="label">Reglamentos por Tema (promedio)</div></div>
    <div class="stat-card"><div class="num">${coverage}%</div><div class="label">Cobertura de Matriz</div></div>
  `;

  // Top reglamentos
  const regCounts = reglamentos.map(r => ({
    name: r.name,
    count: cruces.filter(c => c.regId === r.id).length
  })).sort((a,b) => b.count - a.count).slice(0, 10);

  const maxReg = regCounts[0]?.count || 1;
  document.getElementById('topRegs').innerHTML = `<h3>Top 10 — Reglamentos con más temas</h3>` +
    regCounts.map(r => `
      <div class="bar-row">
        <div class="bar-label">${r.name}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${(r.count/maxReg)*100}%;background:var(--accent);">${r.count}</div>
        </div>
      </div>`).join('');

  // Top temas
  const temaCounts = temas.map(t => ({
    name: t.name,
    count: cruces.filter(c => c.temaId === t.id).length
  })).sort((a,b) => b.count - a.count).slice(0, 10);

  const maxTema = temaCounts[0]?.count || 1;
  document.getElementById('topTemas').innerHTML = `<h3>Top 10 — Temas más mencionados</h3>` +
    temaCounts.map(t => `
      <div class="bar-row">
        <div class="bar-label">${t.name}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${(t.count/maxTema)*100}%;background:var(--green);">${t.count}</div>
        </div>
      </div>`).join('');
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
renderList();
</script>
