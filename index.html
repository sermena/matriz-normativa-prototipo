<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorador de Matriz Normativa — Prototipo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3347;
    --text: #e2e4ed;
    --text-dim: #8b8fa7;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --accent-glow: rgba(108, 92, 231, 0.15);
    --green: #00cec9;
    --orange: #fdcb6e;
    --red: #e17055;
    --pink: #fd79a8;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(108,92,231,0.06) 0%, transparent 100%);
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .header h1 span { color: var(--accent-light); }
  .header .badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* ── Nav Tabs ── */
  .nav {
    display: flex;
    gap: 4px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .nav button {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border: 1px solid transparent;
    border-radius: 8px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav button:hover { color: var(--text); background: var(--surface2); }
  .nav button.active {
    color: var(--accent-light);
    background: var(--accent-glow);
    border-color: rgba(108,92,231,0.3);
  }

  /* ── Main Layout ── */
  .main { display: flex; height: calc(100vh - 110px); }

  /* ── Sidebar ── */
  .sidebar {
    width: 340px;
    min-width: 340px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
  }
  .search-box {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .search-box input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-box input:focus { border-color: var(--accent); }

  .list-container {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .list-container::-webkit-scrollbar { width: 6px; }
  .list-container::-webkit-scrollbar-track { background: transparent; }
  .list-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .cat-group { margin-bottom: 4px; }
  .cat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    padding: 10px 12px 4px;
  }
  .list-item {
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    line-height: 1.4;
  }
  .list-item:hover { background: var(--surface2); }
  .list-item.active {
    background: var(--accent-glow);
    border: 1px solid rgba(108,92,231,0.25);
  }
  .list-item .count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent-light);
    background: rgba(108,92,231,0.12);
    padding: 2px 8px;
    border-radius: 12px;
    flex-shrink: 0;
    margin-left: 8px;
  }

  /* ── Detail Panel ── */
  .detail {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
  }
  .detail::-webkit-scrollbar { width: 6px; }
  .detail::-webkit-scrollbar-track { background: transparent; }
  .detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .detail-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 14px;
    text-align: center;
  }
  .detail-empty .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }

  .detail-header {
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .detail-header .cat-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--green);
    margin-bottom: 6px;
  }
  .detail-header h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.3;
  }
  .detail-header .stats {
    margin-top: 12px;
    display: flex;
    gap: 20px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .detail-header .stats strong {
    color: var(--accent-light);
    font-weight: 600;
  }

  .relation-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 1100px) {
    .relation-grid { grid-template-columns: 1fr; }
  }

  .relation-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: all 0.2s;
    cursor: pointer;
  }
  .relation-card:hover {
    border-color: var(--accent);
    background: var(--accent-glow);
    transform: translateY(-1px);
  }
  .relation-card .r-name {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .relation-card .r-cat {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .relation-card .r-article {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--orange);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  /* ── Heatmap View ── */
  .heatmap-container {
    padding: 24px 32px;
    height: calc(100vh - 110px);
    overflow: auto;
    display: none;
  }
  .heatmap-container h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .heatmap-container .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  .heatmap-grid {
    display: inline-grid;
    gap: 3px;
  }
  .heatmap-cell {
    width: 36px;
    height: 36px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .heatmap-cell:hover {
    transform: scale(1.3);
    z-index: 10;
    box-shadow: 0 0 12px rgba(108,92,231,0.5);
  }
  .heatmap-cell.empty { background: var(--surface); }
  .heatmap-cell.filled { background: var(--accent); }
  .heatmap-cell.filled.high { background: #6c5ce7; }
  .heatmap-cell.filled.med { background: #4a3fb5; }
  .heatmap-cell.filled.low { background: #2d2a6e; }

  .heatmap-label-col {
    font-size: 10px;
    color: var(--text-dim);
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    max-height: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 4px 0;
    text-align: left;
  }
  .heatmap-label-row {
    font-size: 11px;
    color: var(--text-dim);
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 8px;
    text-align: right;
    line-height: 36px;
  }

  .tooltip {
    position: fixed;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    z-index: 1000;
    max-width: 300px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    display: none;
  }
  .tooltip .t-reg { font-weight: 600; color: var(--accent-light); }
  .tooltip .t-tema { color: var(--green); margin-top: 2px; }
  .tooltip .t-art { font-family: 'DM Mono', monospace; color: var(--orange); margin-top: 6px; }

  /* ── Stats View ── */
  .stats-container {
    padding: 32px;
    height: calc(100vh - 110px);
    overflow-y: auto;
    display: none;
  }
  .stats-container h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  .stat-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
  }
  .stat-card .num {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent-light);
    font-family: 'DM Mono', monospace;
  }
  .stat-card .label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .bar-chart { margin-bottom: 32px; }
  .bar-chart h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 14px;
    color: var(--text-dim);
  }
  .bar-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
  }
  .bar-label {
    width: 220px;
    min-width: 220px;
    font-size: 12px;
    text-align: right;
    padding-right: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .bar-track {
    flex: 1;
    height: 24px;
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
    display: flex;
    align-items: center;
    padding-left: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: white;
  }

  /* ── Animations ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: fadeIn 0.25s ease forwards; }
</style>
</head>
<body>

<div class="header">
  <h1>Explorador de <span>Matriz Normativa</span></h1>
  <span class="badge">PROTOTIPO v0.1</span>
</div>

<div class="nav">
  <button class="active" onclick="switchView('explore')">Explorar Relaciones</button>
  <button onclick="switchView('heatmap')">Mapa de Calor</button>
  <button onclick="switchView('stats')">Estadísticas</button>
</div>

<!-- ═══ EXPLORE VIEW ═══ -->
<div class="main" id="view-explore">
  <div class="sidebar">
    <div class="nav" style="padding: 12px 8px; border-bottom: 1px solid var(--border); background: transparent;">
      <button class="active" id="btn-regs" onclick="switchMode('regs')">Reglamentos</button>
      <button id="btn-temas" onclick="switchMode('temas')">Temas</button>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar..." oninput="filterList()">
    </div>
    <div class="list-container" id="listContainer"></div>
  </div>
  <div class="detail" id="detailPanel">
    <div class="detail-empty">
      <div>
        <div class="icon">⟵</div>
        <div>Seleccioná un reglamento o tema<br>para ver sus relaciones</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ HEATMAP VIEW ═══ -->
<div class="heatmap-container" id="view-heatmap">
  <h2>Mapa de Calor — Cruces entre Categorías</h2>
  <p class="subtitle">Cada celda muestra la cantidad de relaciones entre una categoría de reglamento y una categoría de tema</p>
  <div id="heatmapArea"></div>
</div>

<!-- ═══ STATS VIEW ═══ -->
<div class="stats-container" id="view-stats">
  <h2>Estadísticas de la Matriz</h2>
  <div class="stat-cards" id="statCards"></div>
  <div class="bar-chart" id="topRegs"></div>
  <div class="bar-chart" id="topTemas"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ═══════════════════════════════════════════════
//  SAMPLE DATA (Generic / Demo)
// ═══════════════════════════════════════════════

const regCategories = [
  "Normativa Constitucional",
  "Leyes Nacionales",
  "Órganos Superiores",
  "Reglamentos Administrativos",
  "Investigación y Extensión",
  "Docencia",
  "Recursos Humanos",
  "Vida Estudiantil"
];

const temaCategories = [
  "Órganos Institucionales",
  "Financieras",
  "Funcionarios",
  "Estudiantes",
  "Planificación",
  "Activos y Recursos",
  "Seguridad y Salud"
];

const reglamentos = [];
const temas = [];
const cruces = [];

// Generate sample regulations
const regNames = {
  "Normativa Constitucional": ["Constitución Política"],
  "Leyes Nacionales": ["Ley Orgánica de la Institución", "Ley de Control Interno", "Ley de Administración Pública", "Ley de Presupuestos Públicos"],
  "Órganos Superiores": ["Estatuto Orgánico", "Reglamento del Consejo Institucional", "Reglamento de Asamblea Representativa", "Normas de Secretaría del Consejo"],
  "Reglamentos Administrativos": ["Reglamento de Contratación Administrativa", "Reglamento de Gestión de Activos", "Reglamento de Transportes", "Reglamento de Tecnologías de Información", "Reglamento de Convenios", "Reglamento de Servicios Bibliotecarios"],
  "Investigación y Extensión": ["Reglamento de Investigación", "Reglamento de Extensión", "Reglamento de Propiedad Intelectual", "Reglamento de Centros de Investigación"],
  "Docencia": ["Reglamento de Enseñanza-Aprendizaje", "Reglamento de Planes de Estudio", "Reglamento de Acreditación", "Reglamento de Programas de Posgrado", "Reglamento de Educación Continua"],
  "Recursos Humanos": ["Convención Colectiva", "Reglamento de Carrera Profesional", "Reglamento de Becas para Funcionarios", "Reglamento de Evaluación del Desempeño", "Reglamento de Reclutamiento y Selección"],
  "Vida Estudiantil": ["Reglamento de Becas Estudiantiles", "Reglamento Disciplinario", "Reglamento de Admisión y Matrícula", "Reglamento de Graduación"]
};

const temaNames = {
  "Órganos Institucionales": ["Composición del Consejo Directivo", "Funciones de Asambleas", "Nombramiento de Coordinadores", "Funcionamiento de Comisiones", "Sedes Regionales"],
  "Financieras": ["Presupuesto Institucional", "Procedimientos de Contratación", "Gastos de Representación", "Fondos Especiales", "Ingresos Propios", "Auditoría Financiera"],
  "Funcionarios": ["Derechos Laborales", "Deberes del Personal", "Evaluación del Desempeño", "Régimen Disciplinario", "Capacitación y Formación", "Carrera Profesional", "Jornada Laboral"],
  "Estudiantes": ["Admisión y Matrícula", "Régimen Disciplinario Estudiantil", "Becas y Asistencia", "Graduación", "Derechos Estudiantiles"],
  "Planificación": ["Planificación Estratégica", "Planes Operativos", "Indicadores de Gestión", "Acreditación Institucional"],
  "Activos y Recursos": ["Gestión de Activos Muebles", "Infraestructura", "Tecnologías de Información", "Transportes Institucionales"],
  "Seguridad y Salud": ["Seguridad Ocupacional", "Salud en el Trabajo", "Protocolo de Emergencias"]
};

// Build arrays
let regId = 0;
for (const [cat, names] of Object.entries(regNames)) {
  for (const name of names) {
    reglamentos.push({ id: regId++, name, category: cat });
  }
}

let temaId = 0;
for (const [cat, names] of Object.entries(temaNames)) {
  for (const name of names) {
    temas.push({ id: temaId++, name, category: cat });
  }
}

// Generate random cruces
const artPrefixes = ["Art", "Arts", "Capítulo", "Sección"];
function randomArticle() {
  const p = artPrefixes[Math.floor(Math.random() * 2)];
  const n = Math.floor(Math.random() * 80) + 1;
  if (Math.random() > 0.6) {
    const n2 = n + Math.floor(Math.random() * 5) + 1;
    return `${p} ${n}-${n2}`;
  }
  return `${p} ${n}`;
}

for (const reg of reglamentos) {
  const numRelations = Math.floor(Math.random() * 12) + 2;
  const usedTemas = new Set();
  for (let i = 0; i < numRelations; i++) {
    let t;
    do { t = Math.floor(Math.random() * temas.length); } while (usedTemas.has(t));
    usedTemas.add(t);
    cruces.push({ regId: reg.id, temaId: t, article: randomArticle() });
  }
}

// ═══════════════════════════════════════════════
//  APP STATE & LOGIC
// ═══════════════════════════════════════════════

let currentView = 'explore';
let currentMode = 'regs'; // 'regs' or 'temas'
let selectedId = null;

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav')[0].querySelectorAll('button').forEach((b, i) => {
    b.classList.toggle('active', ['explore','heatmap','stats'][i] === view);
  });
  document.getElementById('view-explore').style.display = view === 'explore' ? 'flex' : 'none';
  document.getElementById('view-heatmap').style.display = view === 'heatmap' ? 'block' : 'none';
  document.getElementById('view-stats').style.display = view === 'stats' ? 'block' : 'none';

  if (view === 'heatmap') renderHeatmap();
  if (view === 'stats') renderStats();
}

function switchMode(mode) {
  currentMode = mode;
  selectedId = null;
  document.getElementById('btn-regs').classList.toggle('active', mode === 'regs');
  document.getElementById('btn-temas').classList.toggle('active', mode === 'temas');
  document.getElementById('searchInput').placeholder = mode === 'regs' ? 'Buscar reglamento...' : 'Buscar tema...';
  document.getElementById('searchInput').value = '';
  renderList();
  renderDetail();
}

function filterList() {
  renderList();
}

function renderList() {
  const container = document.getElementById('listContainer');
  const query = document.getElementById('searchInput').value.toLowerCase();
  const items = currentMode === 'regs' ? reglamentos : temas;

  const grouped = {};
  items.forEach(item => {
    if (query && !item.name.toLowerCase().includes(query)) return;
    if (!grouped[item.category]) grouped[item.category] = [];

    const relCount = currentMode === 'regs'
      ? cruces.filter(c => c.regId === item.id).length
      : cruces.filter(c => c.temaId === item.id).length;

    grouped[item.category].push({ ...item, relCount });
  });

  let html = '';
  for (const [cat, items] of Object.entries(grouped)) {
    html += `<div class="cat-group">
      <div class="cat-label">${cat}</div>`;
    items.forEach(item => {
      html += `<div class="list-item ${selectedId === item.id ? 'active' : ''}" 
                    onclick="selectItem(${item.id})">
        <span>${item.name}</span>
        <span class="count">${item.relCount}</span>
      </div>`;
    });
    html += `</div>`;
  }
  container.innerHTML = html;
}

function selectItem(id) {
  selectedId = id;
  renderList();
  renderDetail();
}

function renderDetail() {
  const panel = document.getElementById('detailPanel');

  if (selectedId === null) {
    panel.innerHTML = `<div class="detail-empty"><div>
      <div class="icon">⟵</div>
      <div>Seleccioná un ${currentMode === 'regs' ? 'reglamento' : 'tema'}<br>para ver sus relaciones</div>
    </div></div>`;
    return;
  }

  const item = currentMode === 'regs'
    ? reglamentos.find(r => r.id === selectedId)
    : temas.find(t => t.id === selectedId);

  const relations = currentMode === 'regs'
    ? cruces.filter(c => c.regId === selectedId).map(c => ({
        ...temas[c.temaId], article: c.article
      }))
    : cruces.filter(c => c.temaId === selectedId).map(c => ({
        ...reglamentos.find(r => r.id === c.regId), article: c.article
      }));

  const catCounts = {};
  relations.forEach(r => { catCounts[r.category] = (catCounts[r.category] || 0) + 1; });
  const topCat = Object.entries(catCounts).sort((a,b) => b[1] - a[1])[0];

  let html = `<div class="detail-header animate-in">
    <div class="cat-tag">${item.category}</div>
    <h2>${item.name}</h2>
    <div class="stats">
      <span><strong>${relations.length}</strong> ${currentMode === 'regs' ? 'temas relacionados' : 'reglamentos relacionados'}</span>
      <span><strong>${Object.keys(catCounts).length}</strong> categorías</span>
      ${topCat ? `<span>Mayor concentración: <strong>${topCat[0]}</strong></span>` : ''}
    </div>
  </div>`;

  // Group relations by category
  const grouped = {};
  relations.forEach(r => {
    if (!grouped[r.category]) grouped[r.category] = [];
    grouped[r.category].push(r);
  });

  for (const [cat, rels] of Object.entries(grouped)) {
    html += `<div style="margin-bottom: 20px;" class="animate-in">
      <div class="cat-label" style="margin-bottom: 8px;">${cat} (${rels.length})</div>
      <div class="relation-grid">`;
    rels.forEach(r => {
      html += `<div class="relation-card" onclick="jumpTo(${r.id})">
        <div class="r-name">${r.name}</div>
        <div class="r-article">📎 ${r.article}</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  panel.innerHTML = html;
}

function jumpTo(id) {
  // Switch mode and select that item
  const isReg = reglamentos.some(r => r.id === id);
  if (currentMode === 'regs' && !isReg) switchMode('temas');
  else if (currentMode === 'temas' && isReg) switchMode('regs');
  selectItem(id);
}

// ═══════════════════════════════════════════════
//  HEATMAP
// ═══════════════════════════════════════════════

function renderHeatmap() {
  const area = document.getElementById('heatmapArea');

  // Build category-to-category matrix
  const matrix = {};
  regCategories.forEach(rc => {
    matrix[rc] = {};
    temaCategories.forEach(tc => { matrix[rc][tc] = 0; });
  });

  cruces.forEach(c => {
    const reg = reglamentos[c.regId] || reglamentos.find(r => r.id === c.regId);
    const tema = temas[c.temaId];
    if (reg && tema && matrix[reg.category]) {
      matrix[reg.category][tema.category] = (matrix[reg.category][tema.category] || 0) + 1;
    }
  });

  const maxVal = Math.max(...Object.values(matrix).flatMap(r => Object.values(r)));

  const cols = temaCategories.length + 1;
  let html = `<div class="heatmap-grid" style="grid-template-columns: 180px repeat(${temaCategories.length}, 36px);">`;

  // Column headers
  html += `<div></div>`;
  temaCategories.forEach(tc => {
    html += `<div class="heatmap-label-col" title="${tc}">${tc}</div>`;
  });

  // Rows
  regCategories.forEach(rc => {
    html += `<div class="heatmap-label-row" title="${rc}">${rc}</div>`;
    temaCategories.forEach(tc => {
      const val = matrix[rc][tc];
      let cls = 'empty';
      if (val > 0) {
        const pct = val / maxVal;
        cls = pct > 0.6 ? 'filled high' : pct > 0.3 ? 'filled med' : 'filled low';
      }
      html += `<div class="heatmap-cell ${cls}" 
                    data-reg-cat="${rc}" data-tema-cat="${tc}" data-val="${val}"
                    onmouseenter="showTooltipHM(event, this)" 
                    onmouseleave="hideTooltip()"></div>`;
    });
  });

  html += `</div>`;

  // Legend
  html += `<div style="display:flex; gap:16px; align-items:center; margin-top:20px; font-size:12px; color:var(--text-dim);">
    <span>Menos relaciones</span>
    <div style="width:20px;height:14px;background:#2d2a6e;border-radius:3px;"></div>
    <div style="width:20px;height:14px;background:#4a3fb5;border-radius:3px;"></div>
    <div style="width:20px;height:14px;background:#6c5ce7;border-radius:3px;"></div>
    <span>Más relaciones</span>
  </div>`;

  area.innerHTML = html;
}

function showTooltipHM(e, el) {
  const tip = document.getElementById('tooltip');
  tip.innerHTML = `
    <div class="t-reg">${el.dataset.regCat}</div>
    <div class="t-tema">↔ ${el.dataset.temaCat}</div>
    <div class="t-art">${el.dataset.val} relaciones</div>`;
  tip.style.display = 'block';
  tip.style.left = e.clientX + 12 + 'px';
  tip.style.top = e.clientY - 10 + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

// ═══════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════

function renderStats() {
  // Stat cards
  const totalCruces = cruces.length;
  const avgPerReg = (totalCruces / reglamentos.length).toFixed(1);
  const avgPerTema = (totalCruces / temas.length).toFixed(1);
  const coverage = ((cruces.length / (reglamentos.length * temas.length)) * 100).toFixed(1);

  document.getElementById('statCards').innerHTML = `
    <div class="stat-card"><div class="num">${reglamentos.length}</div><div class="label">Reglamentos</div></div>
    <div class="stat-card"><div class="num">${temas.length}</div><div class="label">Temas</div></div>
    <div class="stat-card"><div class="num">${totalCruces}</div><div class="label">Relaciones</div></div>
    <div class="stat-card"><div class="num">${avgPerReg}</div><div class="label">Temas por Reglamento (promedio)</div></div>
    <div class="stat-card"><div class="num">${avgPerTema}</div><div class="label">Reglamentos por Tema (promedio)</div></div>
    <div class="stat-card"><div class="num">${coverage}%</div><div class="label">Cobertura de Matriz</div></div>
  `;

  // Top reglamentos
  const regCounts = reglamentos.map(r => ({
    name: r.name,
    count: cruces.filter(c => c.regId === r.id).length
  })).sort((a,b) => b.count - a.count).slice(0, 10);

  const maxReg = regCounts[0]?.count || 1;
  document.getElementById('topRegs').innerHTML = `<h3>Top 10 — Reglamentos con más temas</h3>` +
    regCounts.map(r => `
      <div class="bar-row">
        <div class="bar-label">${r.name}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${(r.count/maxReg)*100}%;background:var(--accent);">${r.count}</div>
        </div>
      </div>`).join('');

  // Top temas
  const temaCounts = temas.map(t => ({
    name: t.name,
    count: cruces.filter(c => c.temaId === t.id).length
  })).sort((a,b) => b.count - a.count).slice(0, 10);

  const maxTema = temaCounts[0]?.count || 1;
  document.getElementById('topTemas').innerHTML = `<h3>Top 10 — Temas más mencionados</h3>` +
    temaCounts.map(t => `
      <div class="bar-row">
        <div class="bar-label">${t.name}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${(t.count/maxTema)*100}%;background:var(--green);">${t.count}</div>
        </div>
      </div>`).join('');
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
renderList();
</script>
